<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RoyalTable - Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1>🃏 RoyalTable</h1>
    <p>Login or create an account</p>

    <div class="card">
      <h2>Register</h2>
      <input id="registerUsername" placeholder="Username" />
      <input id="registerPassword" type="password" placeholder="Password" />
      <button onclick="register()">Create Account</button>
    </div>

    <div class="card">
      <h2>Login</h2>
      <input id="loginUsername" placeholder="Username" />
      <input id="loginPassword" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
    </div>

    <p id="message"></p>
  </div>

  <script>
    async function register() {
      const username = document.getElementById("registerUsername").value.trim();
      const password = document.getElementById("registerPassword").value.trim();

      const res = await fetch("/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (data.success) {
        location.href = "/lobby";
      } else {
        document.getElementById("message").innerText = data.error || "Register failed";
      }
    }

    async function login() {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value.trim();

      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (data.success) {
        location.href = "/lobby";
      } else {
        document.getElementById("message").innerText = data.error || "Login failed";
      }
    }
  </script>
</body>
</html>
